name: image-api

services:
  image-api:
    image: image-api-gateway:local
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "${IMAGE_API_BIND_ADDRESS:-0.0.0.0}:${IMAGE_API_PORT:-8000}:8000"
    environment:
      IMAGE_API_STATE_DIR: /state
      IMAGE_API_UPSCALE_WORKER_URL: http://upscale-worker:9001
      IMAGE_API_BACKGROUND_WORKER_URL: http://background-worker:9002
      IMAGE_API_GENERATION_WORKER_URL: http://generation-worker:9003
      IMAGE_API_IDEOGRAM_WEIGHTS_PATH: /models/ideogram-4-nf4
      IMAGE_API_LONGCAT_EDIT_WEIGHTS_PATH: /models/longcat-image-edit
      IMAGE_API_LONGCAT_EDIT_TURBO_WEIGHTS_PATH: /models/longcat-image-edit-turbo
      IMAGE_API_LONGCAT_EDIT_REVISION: 7b54ef423aa7854be7861600024be5c56ab7875a
      IMAGE_API_LONGCAT_EDIT_TURBO_REVISION: 6a7262de5549f0bf0ec54c08ef7d283ef41f3214
      IMAGE_API_CUDA_AVAILABLE: "true"
      IMAGE_API_MAX_REQUEST_BYTES: ${IMAGE_API_MAX_REQUEST_BYTES:-21000000}
      IMAGE_API_MAX_UPLOAD_BYTES: ${IMAGE_API_MAX_UPLOAD_BYTES:-20000000}
      IMAGE_API_MAX_INPUT_PIXELS: ${IMAGE_API_MAX_INPUT_PIXELS:-40000000}
      IMAGE_API_MAX_OUTPUT_PIXELS: ${IMAGE_API_MAX_OUTPUT_PIXELS:-80000000}
      IMAGE_API_MAX_QUEUE_DEPTH: ${IMAGE_API_MAX_QUEUE_DEPTH:-100}
      IMAGE_API_MAGIC_PROMPT_BACKEND: ${IMAGE_API_MAGIC_PROMPT_BACKEND:-}
    volumes:
      - image-api-state:/state
      - ${IMAGE_API_IDEOGRAM_WEIGHTS_HOST_PATH:-./models/ideogram-4-nf4}:/models/ideogram-4-nf4:ro
      - ${IMAGE_API_LONGCAT_EDIT_WEIGHTS_HOST_PATH:-./models/longcat-image-edit}:/models/longcat-image-edit:ro
      - ${IMAGE_API_LONGCAT_EDIT_TURBO_WEIGHTS_HOST_PATH:-./models/longcat-image-edit-turbo}:/models/longcat-image-edit-turbo:ro
    depends_on:
      upscale-worker:
        condition: service_healthy
      background-worker:
        condition: service_healthy
      generation-worker:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  upscale-worker:
    image: image-api-upscale-worker:local
    build:
      context: .
      dockerfile: Dockerfile.upscale
    expose:
      - "9001"
    environment:
      IMAGE_API_UPSCALE_WEIGHTS_PATH: /models/upscale
      IMAGE_API_BACKGROUND_WORKER_URL: http://background-worker:9002
      IMAGE_API_GENERATION_WORKER_URL: http://generation-worker:9003
    volumes:
      - ${IMAGE_API_UPSCALE_WEIGHTS_HOST_PATH:-./models/upscale}:/models/upscale:ro
      - image-api-state:/state
    gpus: all
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9001/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  background-worker:
    image: image-api-background-worker:local
    build:
      context: .
      dockerfile: Dockerfile.background
    expose:
      - "9002"
    environment:
      IMAGE_API_BRIA_WEIGHTS_PATH: /models/bria-rmbg-2.0
      IMAGE_API_BIREFNET_WEIGHTS_PATH: /models/birefnet-hr
      IMAGE_API_BIREFNET_REVISION: 5d6b6f8adcb5b417c871b1d84ceaae9871355b7f
      IMAGE_API_UPSCALE_WORKER_URL: http://upscale-worker:9001
      IMAGE_API_GENERATION_WORKER_URL: http://generation-worker:9003
    volumes:
      - ${IMAGE_API_BRIA_WEIGHTS_HOST_PATH:-./models/bria-rmbg-2.0}:/models/bria-rmbg-2.0:ro
      - ${IMAGE_API_BIREFNET_WEIGHTS_HOST_PATH:-./models/birefnet-hr}:/models/birefnet-hr:ro
      - image-api-state:/state
    gpus: all
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9002/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  generation-worker:
    image: image-api-generation-worker:local
    build:
      context: .
      dockerfile: Dockerfile.generation
    expose:
      - "9003"
    environment:
      IMAGE_API_STATE_DIR: /state
      IMAGE_API_IDEOGRAM_WEIGHTS_PATH: /models/ideogram-4-nf4
      IMAGE_API_IDEOGRAM_REPOSITORY_ID: ideogram-ai/ideogram-4-nf4
      IMAGE_API_LONGCAT_EDIT_WEIGHTS_PATH: /models/longcat-image-edit
      IMAGE_API_LONGCAT_EDIT_TURBO_WEIGHTS_PATH: /models/longcat-image-edit-turbo
      IMAGE_API_LONGCAT_EDIT_REVISION: 7b54ef423aa7854be7861600024be5c56ab7875a
      IMAGE_API_LONGCAT_EDIT_TURBO_REVISION: 6a7262de5549f0bf0ec54c08ef7d283ef41f3214
      IMAGE_API_UPSCALE_WORKER_URL: http://upscale-worker:9001
      IMAGE_API_BACKGROUND_WORKER_URL: http://background-worker:9002
      IMAGE_API_CUDA_AVAILABLE: "true"
      IMAGE_API_MAX_QUEUE_DEPTH: ${IMAGE_API_MAX_QUEUE_DEPTH:-100}
      IMAGE_API_MAGIC_PROMPT_BACKEND: ${IMAGE_API_MAGIC_PROMPT_BACKEND:-}
      IMAGE_API_MAGIC_PROMPT_API_KEY: ${IMAGE_API_MAGIC_PROMPT_API_KEY:-}
    volumes:
      - image-api-state:/state
      - ${IMAGE_API_IDEOGRAM_WEIGHTS_HOST_PATH:-./models/ideogram-4-nf4}:/models/ideogram-4-nf4:ro
      - ${IMAGE_API_LONGCAT_EDIT_WEIGHTS_HOST_PATH:-./models/longcat-image-edit}:/models/longcat-image-edit:ro
      - ${IMAGE_API_LONGCAT_EDIT_TURBO_WEIGHTS_HOST_PATH:-./models/longcat-image-edit-turbo}:/models/longcat-image-edit-turbo:ro
    gpus: all
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9003/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  image-api-state:
    name: image-api-state
